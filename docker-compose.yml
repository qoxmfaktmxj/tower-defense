services:
  postgres:
    image: postgres:16-alpine
    container_name: tower-defense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tower_defense
    ports:
      - "5434:5432"
    volumes:
      - tower-defense-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tower_defense"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tower-defense-postgres-data:
